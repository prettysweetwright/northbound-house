<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Northbound House — Coming Soon</title>
  <meta name="description" content="Northbound House is coming soon. Ideas with direction. Products with purpose.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2B72D7;
      --accent:  #C4D600;
      --text:    #111827;
      --muted:   #6b7280;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fff;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1800&q=80');
      background-size: cover;
      background-position: center 40%;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.92);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
    }

    .logo {
      display: block;
      margin-bottom: 3rem;
    }
    .logo img {
      width: 350px;
      height: 260px;
      object-fit: cover;
      object-position: center;
      margin: 0 auto;
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    p {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 2rem auto;
    }

    .motto {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="logo">
      <img src="NHdot_Color.png" alt="Northbound House">
    </a>
    <p class="eyebrow">Coming Soon</p>
    <h1>Something good<br>is on its way.</h1>
    <p>We're putting the finishing touches on our home base. Check back soon.</p>
    <div class="divider"></div>
    <p class="motto">It's all up from here.</p>
  </div>
</body>
</html>
